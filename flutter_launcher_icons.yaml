flutter_launcher_icons:
  # Main icon for non-adaptive launchers
  image_path: "assets/images/logo_red.png"
  
  # Android Configuration
  android: true
  min_sdk_android: 21
  
  # Adaptive Icon Configuration (this is the key fix!)
  adaptive_icon_background: "#ffffff"  # White background
  adaptive_icon_foreground: "assets/images/logo_red.png"  # Your logo as foreground
  
  # Alternative: Use a larger/padded version of your logo
  # adaptive_icon_foreground: "assets/icons/logo_white_padded.png"
  
  # iOS Configuration
  ios: true
  remove_alpha_ios: true
  background_color_ios: "#ffffff"
  
  # Web Configuration
  web:
    generate: true
    image_path: "assets/images/logo_red.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"
  
  # Windows Configuration
  windows:
    generate: true
    image_path: "assets/images/logo_red.png"
    icon_size: 48
  
  # macOS Configuration
  macos:
    generate: true
    image_path: "assets/images/logo_red.png"