name: delveria
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+3

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  freezed_annotation: ^2.4.4
  get_it: ^8.0.3
  json_annotation: ^4.9.0
  dio: ^5.8.0+1
  retrofit: ^4.4.2
  pretty_dio_logger: ^1.4.0
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  flutter_native_splash: ^2.4.6
  flutter_svg: ^2.1.0
  flutter_screenutil: ^5.9.3
  google_fonts: ^6.2.1
  custom_form_w: ^2.0.7
  flutter_secure_storage: ^9.2.4
  shimmer: ^3.0.0
  pin_code_fields: ^8.0.1
  carousel_slider: ^5.1.1
  curved_navigation_bar: ^1.0.6
  fl_chart: ^1.0.0
  dotted_border: ^3.1.0
  styled_drop_down: ^1.0.3
  awesome_snackbar_content: ^0.1.7
  loading_animation_widget: ^1.3.0
  file_picker: ^10.2.1
  cached_network_image: ^3.4.1
  firebase_core: ^4.0.0
  firebase_messaging: ^16.0.0
  flutter_local_notifications: ^19.4.0
  url_launcher: ^6.3.2
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  http: ^1.5.0
  google_maps_url_extractor: ^1.0.2
  font_awesome_flutter: ^10.9.1
  easy_localization: ^3.0.8
  google_maps_flutter: ^2.13.1
  webview_flutter: ^4.13.0
  akedly: ^0.0.4
  pinput: ^5.0.2


dev_dependencies:
  build_runner: ^2.4.15
  retrofit_generator: ^9.7.0
  freezed: ^2.5.7
  json_serializable: ^6.9.5
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/logo_2_icon.png"
  remove_alpha_ios: true
  background_color: "#000000"
  adaptive_icon_background: "#000000"

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/translation/

  fonts:
    - family: Bimini
      fonts:
        - asset: assets/fonts/BiminiNormal.ttf
        - asset: assets/fonts/BiminiItalic.TTF
          style: italic
    - family: Lantx
      fonts:
        - asset: assets/fonts/ArbFONTS-LANTX-Regular.otf
        - asset: assets/fonts/ArbFONTS-LANTX-Bold.otf
          weight: 700
        - asset: assets/fonts/ArbFONTS-LANTX-BoldItalic.otf
          weight: 700
          style: italic
